<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>متجر قطونيل</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Tahoma, Arial, sans-serif;
    background:#f3f5f7;
    direction:rtl;
}

header{
    background:#0056A7;
    text-align:center;
    padding:20px;
}

.logo{
    width:220px;
    max-width:90%;
    border-radius:12px;
    display:block;
    margin:auto;
}

header h1{
    color:white;
    margin-top:15px;
    font-size:34px;
}

header p{
    color:white;
    margin-top:8px;
    font-size:18px;
}

.container{
    width:90%;
    max-width:1200px;
    margin:30px auto;
}

.cards{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
}

.card{
    width:300px;
    background:white;
    border-radius:15px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    overflow:hidden;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h2{
    text-align:center;
    color:#0056A7;
    margin:15px 0;
}

.card p{
    text-align:center;
    color:#555;
    padding:0 15px;
    margin-bottom:20px;
}

button{
    display:block;
    width:80%;
    margin:20px auto;
    background:#0056A7;
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#003d7a;
}

footer{
    background:#0056A7;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

</style>

</head>
<body>

<header>
    <img src="https://raw.githubusercontent.com/cottonilramadi/Cottonil_Store/main/photo%20cottonil.jpg" class="logo" alt="قطونيل">
    <h1>قطونيل</h1>
    <p>أهلاً وسهلاً بكم في متجر قطونيل</p>
</header>

<div class="container">

    <div class="cards">

        <div class="card">
            <img src="https://raw.githubusercontent.com/cottonilramadi/Cottonil_Store/main/photo%20cottonil.jpg" alt="رجالي">
            <h2>قسم الرجال</h2>
            <p>أفضل الملابس الداخلية والقطنية للرجال.</p>
            <button>تسوق الآن</button>
        </div>

        <div class="card">
            <img src="https://raw.githubusercontent.com/cottonilramadi/Cottonil_Store/main/photo%20cottonil.jpg" alt="نسائي">
            <h2>قسم النساء</h2>
            <p>تشكيلة مميزة من الملابس النسائية القطنية.</p>
            <button>تسوق الآن</button>
        </div>

        <div class="card">
            <img src="https://raw.githubusercontent.com/cottonilramadi/Cottonil_Store/main/photo%20cottonil.jpg" alt="أطفال">
            <h2>قسم الأطفال</h2>
            <p>ملابس أطفال قطنية ناعمة ومريحة.</p>
            <button>تسوق الآن</button>
        </div>

    </div>

</div>

<footer>
    جميع الحقوق محفوظة © متجر قطونيل 2026
</footer>

</body>
</html>
